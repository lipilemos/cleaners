<mat-card class="login-form">
  <mat-card-header>
    <mat-card-title>{{ titleKey() | transloco }}</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form
      class="login-form__form"
      [formGroup]="form"
      (ngSubmit)="submit()"
      novalidate
    >
      <mat-form-field class="login-form__field">
        <mat-label>{{ 'loginForm.emailLabel' | transloco }}</mat-label>
        <input
          matInput
          type="email"
          formControlName="email"
          autocomplete="email"
        />
        <app-form-field-error [control]="form.controls.email" />
      </mat-form-field>

      <mat-form-field class="login-form__field">
        <mat-label>{{ 'loginForm.passwordLabel' | transloco }}</mat-label>
        <input
          matInput
          type="password"
          formControlName="password"
          autocomplete="current-password"
        />
        <app-form-field-error [control]="form.controls.password" />
      </mat-form-field>

      @if (errorKey(); as key) {
        <p class="login-form__error" role="alert">{{ key | transloco }}</p>
      }

      <button
        mat-flat-button
        type="submit"
        color="primary"
        class="login-form__submit"
        [disabled]="loading()"
      >
        @if (loading()) {
          <mat-spinner
            diameter="20"
            [attr.aria-label]="'loginForm.loadingLabel' | transloco"
          />
        } @else {
          {{ 'loginForm.submitButton' | transloco }}
        }
      </button>
    </form>
  </mat-card-content>
</mat-card>
